<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kafkaland — Welcome to Nuremberg</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a24; }
      #app { width: 100%; height: 100%; position: relative; }
      canvas { display: block; image-rendering: pixelated; }

      /* ---------- HUD ---------- */
      #hud {
        position: absolute; inset: 0; pointer-events: none;
        font-family: "Courier New", monospace; color: #fff;
        user-select: none;
      }
      #quest {
        position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
        background: rgba(20, 20, 30, 0.8); border: 2px solid #e8d5a0;
        border-radius: 6px; padding: 8px 18px; font-size: 14px;
        max-width: 70%; text-align: center;
      }
      #hint {
        position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
        background: rgba(20, 20, 30, 0.85); border: 1px solid #fff;
        border-radius: 4px; padding: 5px 12px; font-size: 13px;
        display: none;
      }
      #backpack {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 8px; padding: 10px;
        background: rgba(20, 20, 30, 0.8); border: 2px solid #e8d5a0;
        border-radius: 8px;
      }
      .slot {
        width: 52px; height: 52px; border: 2px solid #6b6b7a;
        border-radius: 6px; background: rgba(60, 60, 75, 0.6);
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; font-size: 22px; position: relative;
      }
      .slot.filled { border-color: #e8d5a0; background: rgba(90, 80, 50, 0.6); }
      .slot .label {
        position: absolute; bottom: -18px; font-size: 9px; color: #e8d5a0;
        white-space: nowrap;
      }
      #toast {
        position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
        background: rgba(40, 90, 40, 0.9); border: 2px solid #9be89b;
        border-radius: 6px; padding: 6px 16px; font-size: 13px;
        opacity: 0; transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div id="quest">Willkommen in Nürnberg! Collect your documents scattered around town. (WASD to move, E to pick up)</div>
        <div id="hint">Press <b>E</b> to pick up</div>
        <div id="backpack"></div>
        <div id="toast"></div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
